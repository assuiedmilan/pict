name: Build all platforms
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 6'

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macOS runners pinned explicitly: macos-latest migrates to macOS 26 in June 2026
        os: [ubuntu-latest, windows-latest, macos-15, macos-26]

    steps:
    - uses: actions/checkout@v5

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

    - name: Upload artifacts
      uses: actions/upload-artifact@v6
      with:
        name: pict-${{ matrix.os }}
        path: |
          build/cli/${{ env.BUILD_TYPE }}/pict.exe
          build/cli/${{ env.BUILD_TYPE }}/pict.pdb
          build/api/${{ env.BUILD_TYPE }}/pict.lib
          build/api/${{ env.BUILD_TYPE }}/pict.dll
          build/api/${{ env.BUILD_TYPE }}/pict.pdb
          build/cli/pict
          build/api/libpict.a
          build/api/libpict.so
          build/api/libpict.dylib
        if-no-files-found: error
